name: Build Vivarium

# This tells GitHub WHEN to run the script
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    # This spins up a temporary Linux server
    runs-on: ubuntu-latest

    steps:
    # 1. Download your code onto the temporary server
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Install Java (Minecraft 1.18 to 1.20.4 uses Java 17. Change to '21' if using 1.20.5+)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Configure Gradle caching to make future builds faster
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # 4. Make the Gradle wrapper executable (fixes a common Linux permission error)
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 5. Run the actual build command
    - name: Build with Gradle
      run: ./gradlew build

    # 6. Find the compiled .jar and upload it so you can download it
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Vivarium-Build
        path: build/libs/*.jar